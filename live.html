<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>EvalCall · 比赛演示入口</title>
  <style>
    :root{--ink:#111827;--muted:#667085;--line:#d8dee9;--paper:#f7f9fc;--yellow:#ffc800;--green:#138a62;--red:#c9372c}
    *{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;min-height:100vh;display:grid;place-items:center;padding:28px}
    main{width:min(980px,100%);background:#fff;border:1px solid var(--line);box-shadow:0 24px 70px rgba(15,23,42,.09);padding:56px 64px 52px;position:relative;overflow:hidden}
    .brand{display:flex;align-items:center;gap:12px;font-size:15px;font-weight:700;letter-spacing:.04em;color:var(--muted)}
    .mark{display:grid;place-items:center;width:34px;height:34px;background:var(--yellow);border-radius:10px;color:#111827;font-weight:900}
    h1{font-size:clamp(42px,6vw,74px);line-height:1.03;letter-spacing:-.045em;margin:48px 0 18px;max-width:790px}
    .lead{font-size:20px;line-height:1.7;color:var(--muted);max-width:720px;margin:0}
    .signal{margin:48px 0 40px;display:grid;grid-template-columns:repeat(6,1fr);gap:10px;position:relative}
    .signal:before{content:"";position:absolute;left:4%;right:4%;top:50%;height:2px;background:var(--line);transform:translateY(-50%)}
    .node{height:12px;border-radius:99px;background:#dfe5ee;position:relative;z-index:1;overflow:hidden}
    .node:after{content:"";position:absolute;inset:0;background:var(--yellow);transform:translateX(-110%);animation:relay 3.6s cubic-bezier(.2,.7,.2,1) infinite}
    .node:nth-child(2):after{animation-delay:.35s}.node:nth-child(3):after{animation-delay:.7s}.node:nth-child(4):after{animation-delay:1.05s}.node:nth-child(5):after{animation-delay:1.4s}.node:nth-child(6):after{animation-delay:1.75s}
    @keyframes relay{0%,20%{transform:translateX(-110%)}45%,72%{transform:translateX(0)}100%{transform:translateX(110%)}}
    .status{display:flex;align-items:center;gap:11px;font-size:15px;font-weight:650;margin-bottom:20px}.dot{width:10px;height:10px;border-radius:50%;background:#98a2b3;box-shadow:0 0 0 6px rgba(152,162,179,.12)}
    .ready .dot{background:var(--green);box-shadow:0 0 0 6px rgba(19,138,98,.12)}.failed .dot{background:var(--red);box-shadow:0 0 0 6px rgba(201,55,44,.12)}
    .actions{display:flex;gap:14px;align-items:center;flex-wrap:wrap}.button{appearance:none;border:0;text-decoration:none;font:inherit;font-weight:750;padding:16px 24px;min-height:56px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s ease,box-shadow .15s ease}.primary{background:var(--yellow);color:#111827;box-shadow:0 10px 24px rgba(255,200,0,.22)}.primary:hover{transform:translateY(-2px);box-shadow:0 14px 28px rgba(255,200,0,.28)}.primary[aria-disabled="true"]{opacity:.45;pointer-events:none}.secondary{color:var(--ink);border-bottom:1px solid var(--ink);padding-left:4px;padding-right:4px}.button:focus-visible{outline:3px solid #175cd3;outline-offset:4px}
    .truth{margin-top:38px;padding-top:20px;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:22px;color:var(--muted);font-size:13px}.truth strong{color:var(--ink)}
    @media(max-width:700px){main{padding:36px 26px}h1{margin-top:34px}.truth{display:block}.truth span{display:block;margin-top:8px}}
    @media(prefers-reduced-motion:reduce){.node:after{animation:none;transform:none}.button{transition:none}}
  </style>
</head>
<body>
  <main>
    <div class="brand"><span class="mark">E</span><span>EvalCall · 决赛演示入口</span></div>
    <h1>让外呼模型在上线前，先失败十次</h1>
    <p class="lead">从任务指令、用户模拟到上线门禁与同尺回归，六步完成一次可追溯的外呼模型指令遵循评测。</p>
    <div class="signal" aria-label="六步评测链路"><i class="node"></i><i class="node"></i><i class="node"></i><i class="node"></i><i class="node"></i><i class="node"></i></div>
    <div id="status" class="status"><span class="dot"></span><span>正在检查实时评测通道</span></div>
    <div class="actions">
      <a id="live" class="button primary" href="#" aria-disabled="true">打开在线实时 Demo →</a>
      <a id="fallback" class="button secondary" href="app.html">查看已验证完整结果</a>
    </div>
    <div class="truth"><span><strong>实时通道</strong>：现场重新编译、生成压力回应并调用被测模型</span><span><strong>兜底通道</strong>：读取已审计正式产物，不伪装实时执行</span></div>
  </main>
  <script>
    const params=new URLSearchParams(location.search),access=params.get('access')||'',status=document.querySelector('#status'),live=document.querySelector('#live'),fallback=document.querySelector('#fallback');
    function setStatus(kind,text){status.className='status '+kind;status.lastElementChild.textContent=text}
    fetch('live-endpoint.json?ts='+Date.now(),{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('入口配置不可用');return r.json()}).then(async cfg=>{
      fallback.href=cfg.fallback_url||'app.html';
      if(!access){setStatus('failed','实时入口需要从比赛 PPT 打开');return}
      const target=String(cfg.live_url||'').replace(/\/$/,'')+'/?access='+encodeURIComponent(access);
      live.href=target;live.setAttribute('aria-disabled','false');
      try{await fetch(String(cfg.live_url||'').replace(/\/$/,'')+'/api/health?ts='+Date.now(),{mode:'no-cors',cache:'no-store'});setStatus('ready','实时评测通道已就绪')}catch(error){setStatus('failed','实时通道暂未连接，请使用已验证完整结果')}
    }).catch(()=>setStatus('failed','入口配置暂不可用，请使用已验证完整结果'));
  </script>
</body>
</html>
