<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="EvalCall 六步外呼模型评测工作台">
  <title>EvalCall · 外呼模型评测</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23ffd100'/%3E%3Ctext x='20' y='45' font-size='40' font-family='Arial' font-weight='900' fill='%23142039'%3EE%3C/text%3E%3C/svg%3E">
  <style>
    :root{
      --canvas:#eef2f6;--paper:#ffffff;--ink:#142039;--muted:#687386;--line:#d9e0e9;
      --input:#1f5f9d;--input-soft:#edf5fc;--output:#08755d;--output-soft:#e8f6f1;
      --signal:#ffd100;--signal-dark:#6d5700;--danger:#bd352c;--danger-soft:#fff0ee;
      --shadow:0 22px 64px rgba(20,32,57,.10);--radius:18px
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;min-height:100vh;color:var(--ink);background:var(--canvas);font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
    button,input,select{font:inherit}
    button{cursor:pointer}
    button:focus-visible,input:focus-visible,select:focus-visible,a:focus-visible{outline:3px solid rgba(255,209,0,.65);outline-offset:2px}
    button:disabled{cursor:not-allowed;opacity:.48}
    .topbar{min-height:70px;background:var(--paper);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:20px;padding:12px max(22px,calc((100vw - 1320px)/2));position:sticky;top:0;z-index:20}
    .brand{display:flex;align-items:center;gap:11px;min-width:0}
    .brand-mark{width:39px;height:39px;border-radius:11px;background:var(--signal);display:grid;place-items:center;font:950 20px "Arial Narrow",sans-serif;color:#241d00;box-shadow:inset 0 -3px 0 rgba(0,0,0,.08)}
    .brand strong{font-size:18px;letter-spacing:-.02em}.brand span{display:block;color:var(--muted);font-size:11px;font-weight:700;margin-top:1px}
    .top-controls{display:flex;align-items:center;justify-content:flex-end;gap:10px;flex-wrap:wrap}
    .mode-switch{display:flex;padding:3px;border:1px solid var(--line);background:#f5f7fa;border-radius:12px}
    .mode-switch button{border:0;background:transparent;border-radius:9px;padding:8px 11px;color:var(--muted);font-size:11px;font-weight:850}
    .mode-switch button.active{background:var(--paper);color:var(--ink);box-shadow:0 2px 10px rgba(20,32,57,.09)}
    .truth-badge{font-size:10px;font-weight:900;padding:8px 10px;border-radius:999px;background:#fff5c2;color:var(--signal-dark);white-space:nowrap}
    .truth-badge.live{background:var(--output-soft);color:var(--output)}
    main{max-width:1320px;margin:0 auto;padding:26px 22px 54px}
    .title-row{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:15px}
    h1{font-size:27px;line-height:1.1;margin:0;letter-spacing:-.04em}
    .formula{font:900 12px ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--signal-dark);letter-spacing:.09em;white-space:nowrap}
    .workbench{background:var(--paper);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}
    .steps{display:grid;grid-template-columns:repeat(6,minmax(150px,1fr));background:#f7f9fb;border-bottom:1px solid var(--line);overflow:auto}
    .step{border:0;border-right:1px solid var(--line);background:transparent;color:#7a8495;text-align:left;padding:16px 14px;display:flex;align-items:center;gap:10px;min-width:150px}
    .step:last-child{border-right:0}
    .step-index{width:30px;height:30px;border-radius:9px;background:#e7ecf2;display:grid;place-items:center;font:950 12px "Arial Narrow",sans-serif;flex:0 0 auto}
    .step-name{font-size:12px;font-weight:900;line-height:1.3;white-space:nowrap}
    .step.active{background:#fff8d8;color:#3f350d}.step.active .step-index{background:var(--signal);color:#211b00}
    .step.done{color:var(--output)}.step.done .step-index{background:var(--output-soft);color:var(--output)}
    .step.core:not(.active){box-shadow:inset 0 -3px 0 var(--signal)}
    .stage{padding:24px}
    .stage-head{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:17px}
    .stage-head h2{font-size:22px;margin:0;letter-spacing:-.025em}
    .run-label{font:700 10px ui-monospace,SFMono-Regular,Menlo,monospace;color:#7d8796;white-space:nowrap;max-width:55%;overflow:hidden;text-overflow:ellipsis}
    .flow-map{position:relative;margin:0 0 18px;border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,#fbfcfd 0%,#f6f8fb 100%);overflow:hidden}
    .flow-map::after{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(110deg,transparent 0 43%,rgba(255,209,0,.08) 50%,transparent 57%);transform:translateX(-120%)}
    .flow-map.running::after{animation:scan 1.55s ease-in-out infinite}
    .flow-map-head{height:35px;padding:0 13px;border-bottom:1px solid #e5eaf0;display:flex;align-items:center;justify-content:space-between;gap:12px;background:rgba(255,255,255,.76)}
    .flow-map-title{display:flex;align-items:center;gap:8px;font-size:10px;font-weight:950;letter-spacing:.08em;color:#4d5869}
    .flow-map-title::before{content:"";width:8px;height:8px;border-radius:2px;background:var(--signal);box-shadow:0 0 0 4px rgba(255,209,0,.16)}
    .flow-state{font:800 9px ui-monospace,SFMono-Regular,Menlo,monospace;color:#8993a2}
    .flow-map.done .flow-state{color:var(--output)}.flow-map.running .flow-state{color:var(--signal-dark)}
    .flow-tree{position:relative;display:grid;grid-template-columns:minmax(0,1fr) 62px minmax(0,1fr) 62px minmax(0,1fr);align-items:center;gap:0;min-height:132px;padding:12px 16px}
    .flow-column{position:relative;display:grid;align-content:center;gap:6px;min-width:0}
    .flow-column::before{content:"";position:absolute;left:7px;top:14px;bottom:14px;width:1px;background:#cdd5df}
    .flow-column-label{position:relative;padding-left:18px;margin-bottom:1px;font:850 8px ui-monospace,SFMono-Regular,Menlo,monospace;color:#8b95a5;letter-spacing:.12em;text-transform:uppercase}
    .flow-node{position:relative;min-height:26px;padding:6px 8px 6px 25px;border:1px solid #dce2e9;border-radius:8px;background:#fff;color:#647083;font-size:9px;font-weight:850;line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;box-shadow:0 2px 5px rgba(20,32,57,.035);transition:border-color .25s,background .25s,color .25s,transform .25s,box-shadow .25s}
    .flow-node::before{content:"";position:absolute;z-index:1;left:4px;top:50%;width:7px;height:7px;border:3px solid #f7f9fb;border-radius:50%;background:#c8d0db;transform:translateY(-50%)}
    .flow-node small{margin-left:5px;color:#929baa;font:750 8px ui-monospace,SFMono-Regular,Menlo,monospace}
    .flow-column.input .flow-node{border-color:#c9dced;background:var(--input-soft);color:var(--input)}
    .flow-column.input .flow-node::before{background:var(--input)}
    .flow-link{position:relative;height:2px;margin:0 9px;background:#d3dae3}
    .flow-link::before,.flow-link::after{content:"";position:absolute;top:50%;transform:translateY(-50%)}
    .flow-link::before{left:-3px;width:7px;height:7px;border-radius:50%;background:#d3dae3}
    .flow-link::after{right:-1px;width:7px;height:7px;border-top:2px solid #bfc8d4;border-right:2px solid #bfc8d4;transform:translateY(-50%) rotate(45deg)}
    .flow-pulse{position:absolute;z-index:2;left:-4px;top:50%;width:9px;height:9px;border-radius:50%;background:var(--signal);box-shadow:0 0 0 5px rgba(255,209,0,.18);transform:translateY(-50%);opacity:0}
    .flow-map.running .flow-pulse{opacity:1;animation:signalTravel 1.05s cubic-bezier(.45,0,.25,1) infinite}
    .flow-map.running .flow-link.second .flow-pulse{animation-delay:.43s}
    .flow-map.running .flow-column.process .flow-node.active{border-color:#e1c242;background:#fff9d9;color:#574800;animation:nodeWake .9s both;box-shadow:0 0 0 4px rgba(255,209,0,.12)}
    .flow-map.running .flow-column.process .flow-node.active::before{background:var(--signal);animation:nodePulse 1s ease-in-out infinite}
    .flow-map.running .flow-column.process .flow-node.done{border-color:#ead77b;background:#fffdf0;color:#75651a}
    .flow-map.running .flow-column.process .flow-node.done::before{background:#d5b800}
    .flow-map.running .flow-column.process .flow-node.pending{opacity:.58}
    .flow-map.done .flow-link{background:linear-gradient(90deg,var(--input),var(--signal),var(--output))}
    .flow-map.done .flow-link::before{background:var(--input)}.flow-map.done .flow-link::after{border-color:var(--output)}
    .flow-map.done .flow-column.process .flow-node{border-color:#e1c242;background:#fff9d9;color:#574800}
    .flow-map.done .flow-column.process .flow-node::before{background:var(--signal)}
    .flow-map.done .flow-column.output .flow-node{border-color:#b9ddcf;background:var(--output-soft);color:var(--output);box-shadow:0 3px 9px rgba(8,117,93,.08)}
    .flow-map.done .flow-column.output .flow-node::before{background:var(--output)}
    @keyframes scan{50%,100%{transform:translateX(120%)}}
    @keyframes signalTravel{0%{left:-4px}100%{left:calc(100% - 4px)}}
    @keyframes nodeWake{0%{transform:translateY(3px);box-shadow:none}55%{border-color:var(--signal);background:#fff9d9;color:#574800}100%{transform:translateY(0)}}
    @keyframes nodePulse{50%{box-shadow:0 0 0 5px rgba(255,209,0,.25)}}
    .io-grid{display:grid;grid-template-columns:minmax(0,1fr) 116px minmax(0,1fr);gap:16px;align-items:stretch;min-height:488px}
    .io-card{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--paper);min-width:0}
    .io-card.input{box-shadow:inset 0 4px 0 var(--input)}.io-card.output{box-shadow:inset 0 4px 0 var(--output)}
    .io-head{height:58px;padding:0 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;background:#fbfcfd}
    .io-title{font-size:13px;font-weight:950;letter-spacing:.14em}.input .io-title{color:var(--input)}.output .io-title{color:var(--output)}
    .io-type{font:750 9px ui-monospace,SFMono-Regular,Menlo,monospace;color:#8b95a5;letter-spacing:.04em}
    .io-body{height:428px;overflow:auto;padding:17px}
    .relay{position:relative;display:grid;place-items:center;align-content:center;min-height:488px}
    .relay::before{content:"";position:absolute;left:0;right:0;top:50%;height:3px;background:repeating-linear-gradient(90deg,#dce2e9 0 11px,transparent 11px 17px)}
    .relay::after{content:"";position:absolute;right:1px;top:calc(50% - 7px);width:12px;height:12px;border-top:3px solid #dce2e9;border-right:3px solid #dce2e9;transform:rotate(45deg)}
    .execute{z-index:2;width:92px;min-height:92px;padding:12px 8px;border:0;border-radius:50%;background:var(--signal);color:#211b00;font-size:12px;line-height:1.45;font-weight:950;box-shadow:0 13px 28px rgba(173,135,0,.27),inset 0 -4px 0 rgba(0,0,0,.08)}
    .relay.running::before{background:linear-gradient(90deg,#dce2e9,var(--signal),#dce2e9);background-size:220% 100%;animation:flow 1s linear infinite}.relay.running::after{border-color:var(--signal)}
    @keyframes flow{to{background-position:-220% 0}}
    .empty{height:100%;min-height:260px;border:1px dashed #ccd5e0;border-radius:13px;display:grid;place-items:center;text-align:center;color:#98a1ae;font-size:12px;padding:24px}
    .preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
    .preset{border:1px solid var(--line);border-radius:11px;background:#fff;text-align:left;padding:11px;min-width:0}
    .preset b{display:block;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.preset span{display:block;font-size:9px;color:var(--muted);margin-top:3px}
    .preset.selected{border-color:#c49d00;background:#fff9dc;box-shadow:0 0 0 2px rgba(255,209,0,.16)}
    .field{margin-top:12px}.field:first-child{margin-top:0}.field-label{font-size:10px;font-weight:900;color:#5f6a7b;margin-bottom:6px}
    .material-library{margin-top:12px;border:1px solid #d9c24b;border-radius:13px;background:linear-gradient(180deg,#fffdf1,#fff);overflow:hidden;box-shadow:0 6px 18px rgba(109,87,0,.06)}
    .material-library-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 11px;border-bottom:1px solid #eee3a8;background:#fff8cf}
    .material-library-head b{font-size:10px}.material-library-head span{font-size:8px;font-weight:900;color:var(--output);background:var(--output-soft);padding:4px 6px;border-radius:999px;white-space:nowrap}
    .material-row{display:grid;grid-template-columns:31px minmax(0,1fr);gap:9px;align-items:center;padding:10px 11px;border-top:1px solid #edf0f4}.material-row:first-of-type{border-top:0}
    .material-icon{width:31px;height:31px;border-radius:9px;background:var(--ink);color:var(--signal);display:grid;place-items:center;font:950 9px ui-monospace,SFMono-Regular,Menlo,monospace}
    .material-copy{min-width:0}.material-copy label{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:9px;font-weight:900;color:#5f6a7b;margin-bottom:5px}.material-copy label span{font-size:8px;color:var(--output)}
    .material-select{width:100%;border:1px solid #cfd7e2;border-radius:9px;background:#fff;color:var(--ink);padding:8px 30px 8px 9px;font-size:9.5px;font-weight:850;cursor:pointer}
    .material-generated{border:1px dashed #b9c5d3;border-radius:9px;background:#f8fafc;padding:8px 9px;font-size:9px;font-weight:800;color:var(--muted)}
    .mode-note{padding:9px 10px;border-radius:10px;background:#fff6c9;color:#6e5900;font-size:10px;font-weight:800;margin-bottom:12px}.mode-note.live{background:var(--output-soft);color:var(--output)}
    .entry-switch{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}.entry-switch button{border:1px solid var(--line);border-radius:10px;background:#f7f9fb;color:var(--muted);padding:9px 8px;font-size:10px;font-weight:900}.entry-switch button.selected{border-color:#c49d00;background:#fff9dc;color:#4d3e00}.entry-switch.disabled button{cursor:default}
    .inline-fields{display:grid;grid-template-columns:1fr 100px;gap:8px;margin-top:10px}.text-input{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 10px;background:#fff;color:var(--ink);font-size:10px;font-weight:750}
    .metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px}.metric{border:1px solid var(--line);background:#f9fafc;border-radius:12px;padding:11px;min-width:0}.metric.wide{grid-column:1/-1}
    .metric b{display:block;font:950 20px "Arial Narrow",sans-serif;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.metric b.text{font-family:inherit;font-size:14px}.metric span{display:block;margin-top:4px;font-size:9px;color:var(--muted)}
    .status-line{margin-top:10px;padding:9px 10px;border-radius:10px;background:var(--output-soft);color:var(--output);font-size:10px;font-weight:850;display:flex;align-items:center;gap:7px}.status-line.error{background:var(--danger-soft);color:var(--danger)}
    .dot{width:7px;height:7px;background:currentColor;border-radius:50%;flex:0 0 auto}
    .excerpt{margin-top:11px;border-left:3px solid var(--input);border-radius:0 9px 9px 0;background:var(--input-soft);padding:10px;font:10px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace;max-height:126px;overflow:auto;white-space:pre-wrap}
    .artifact-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px}.artifact{display:inline-flex;align-items:center;text-decoration:none;border:1px solid var(--line);border-radius:8px;padding:7px 9px;color:var(--ink);font-size:9px;font-weight:850;background:#fff}.artifact:hover{border-color:var(--output);color:var(--output)}
    .list{display:grid;gap:8px;margin-top:10px}.item{border:1px solid var(--line);border-radius:11px;padding:10px;background:#fff}.item-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px}.item-id{font:750 9px ui-monospace,SFMono-Regular,Menlo,monospace;color:#748093}.chip{font-size:8px;font-weight:950;border-radius:6px;padding:3px 6px;background:#eef1f5;color:#526073}.chip.fail,.chip.critical{background:var(--danger-soft);color:var(--danger)}.chip.pass{background:var(--output-soft);color:var(--output)}
    .item b{display:block;font-size:11px;line-height:1.45}.item p{font-size:9px;line-height:1.5;color:var(--muted);margin:5px 0 0}
    .progress{border:1px solid var(--line);border-radius:12px;background:#fafbfc;padding:12px}.progress-top{display:flex;justify-content:space-between;gap:10px;font-size:10px;font-weight:850}.bar{height:8px;border-radius:99px;background:#e3e8ed;overflow:hidden;margin-top:9px}.bar i{height:100%;display:block;background:var(--signal);transition:width .3s}
    .gate{border:1px solid var(--danger);border-radius:13px;background:var(--danger-soft);padding:12px;margin-bottom:10px}.gate.pass{border-color:var(--output);background:var(--output-soft)}.gate b{font-size:24px;display:block}.gate span{font-size:9px;color:var(--muted)}
    .problem{border:1px solid var(--line);border-radius:10px;padding:9px;margin-top:7px}.problem-head{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:10px}.problem-name{font-weight:850;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.problem-rate{font:900 11px "Arial Narrow",sans-serif;color:var(--danger)}.problem .bar{height:6px;margin-top:6px}.problem .bar i{background:var(--danger)}
    .root{border-left:4px solid var(--signal);background:#fff9dd;border-radius:0 11px 11px 0;padding:12px;margin-bottom:9px}.root-head{display:flex;justify-content:space-between;gap:10px}.root b{font-size:15px}.root p{margin:6px 0 0;color:#685a25;font-size:10px;line-height:1.5}
    .loop{display:grid;grid-template-columns:26px 1fr;gap:7px 9px;align-items:center;margin-top:12px}.loop-num{width:26px;height:26px;border-radius:8px;background:var(--signal);display:grid;place-items:center;font:950 11px "Arial Narrow",sans-serif}.loop-text{font-size:10px;font-weight:850}
    .vote-row{display:flex;gap:8px}.vote{flex:1;border:1px solid var(--line);border-radius:10px;background:#fff;padding:9px;font-size:10px;font-weight:850}.vote.selected{border-color:#c49d00;background:#fff9dc}
    .footer{display:flex;align-items:center;justify-content:space-between;gap:12px;padding-top:18px}.nav{border:1px solid var(--line);border-radius:10px;background:#f3f6f9;color:var(--ink);padding:10px 15px;font-size:11px;font-weight:900}.nav.primary{border-color:var(--ink);background:var(--ink);color:#fff}
    .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;border-radius:10px;padding:10px 14px;font-size:11px;font-weight:800;opacity:0;pointer-events:none;transition:.2s;z-index:30;max-width:min(560px,90vw);text-align:center}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast.error{background:var(--danger)}
    @media(max-width:920px){.flow-tree{grid-template-columns:1fr 36px 1fr 36px 1fr;padding:11px 9px}.flow-link{margin:0 4px}.flow-node{padding-left:20px}.flow-node::before{left:3px}.io-grid{grid-template-columns:1fr;min-height:0}.relay{min-height:88px}.relay::before{left:50%;right:auto;top:0;bottom:0;width:3px;height:auto;background:repeating-linear-gradient(180deg,#dce2e9 0 11px,transparent 11px 17px)}.relay::after{right:auto;left:calc(50% - 6px);top:auto;bottom:1px;transform:rotate(135deg)}.io-body{height:auto;min-height:360px}.topbar{align-items:flex-start}.brand span{display:none}}
    @media(max-width:620px){.topbar{position:static;display:block}.top-controls{justify-content:flex-start;margin-top:12px}.mode-switch{width:100%}.mode-switch button{flex:1}.title-row{align-items:flex-start;flex-direction:column}.stage{padding:17px}.stage-head{align-items:flex-start;flex-direction:column}.run-label{max-width:100%}.flow-tree{grid-template-columns:1fr;gap:8px;padding:12px}.flow-link{width:2px;height:24px;margin:0 auto;background:#d3dae3}.flow-link::before{left:50%;top:-2px;transform:translate(-50%,-50%)}.flow-link::after{right:auto;left:50%;top:auto;bottom:-1px;transform:translate(-50%,0) rotate(135deg)}.flow-pulse{left:50%;top:-3px;transform:translate(-50%,0)}.flow-map.running .flow-pulse{animation:signalTravelVertical 1.05s cubic-bezier(.45,0,.25,1) infinite}.preset-grid{grid-template-columns:1fr}.material-library-head{align-items:flex-start;flex-direction:column}.metrics{grid-template-columns:1fr}.metric.wide{grid-column:auto}.io-body{padding:13px}.footer{padding-top:14px}}
    @keyframes signalTravelVertical{0%{top:-3px}100%{top:calc(100% - 3px)}}
    @media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;animation:none!important;transition:none!important}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand"><div class="brand-mark">E</div><div><strong>EvalCall</strong><span>外呼模型评测工作台</span></div></div>
    <div class="top-controls">
      <div class="mode-switch" aria-label="运行模式">
        <button id="cacheMode" class="active">完整结果（已验证）</button>
        <button id="liveMode">20秒现场探针</button>
      </div>
      <div id="truthBadge" class="truth-badge">历史产物 · 非现场调用</div>
    </div>
  </header>
  <main>
    <div class="title-row"><h1>外呼模型评测</h1><div class="formula">输入 → 执行 → 输出</div></div>
    <section class="workbench">
      <nav id="steps" class="steps" aria-label="评测步骤"></nav>
      <div class="stage">
        <div class="stage-head"><h2 id="stageTitle"></h2><div id="runLabel" class="run-label">等待开始</div></div>
        <section id="flowMap" class="flow-map" aria-label="当前步骤输入到输出动态流程"></section>
        <div class="io-grid">
          <section class="io-card input"><div class="io-head"><span class="io-title">输入</span><span id="inputType" class="io-type"></span></div><div id="inputBody" class="io-body"></div></section>
          <div id="relay" class="relay"><button id="execute" class="execute"></button></div>
          <section class="io-card output"><div class="io-head"><span class="io-title">输出</span><span id="outputType" class="io-type"></span></div><div id="outputBody" class="io-body"></div></section>
        </div>
        <div class="footer"><button id="prev" class="nav">上一步</button><button id="next" class="nav primary">下一步</button></div>
      </div>
    </section>
  </main>
  <div id="toast" class="toast" role="status"></div>
  <script src="./demo-cache.js"></script>
  <script>
  (()=>{
    "use strict";
    const CACHE=window.EVALCALL_DEMO_CACHE||{presets:{}};
    const MATERIALS={
      official01:{sop:"01_骑手合同生效通知_SOP.yaml",transcripts:"01_骑手合同生效通知_对话_12通.jsonl",count:12},
      t02:{sop:"02_配送时间改约_SOP.yaml",transcripts:"02_配送时间改约_对话_10通.jsonl",count:10},
      real_recruit:{sop:"03_骑手招聘外呼_SOP.yaml",transcripts:"03_骑手招聘外呼_对话_10通.jsonl",count:10},
      official02:{sop:"04_低延迟直播升级通知_SOP.yaml",transcripts:"04_低延迟直播升级通知_对话_10通.jsonl",count:10}
    };
    const STEP=[
      {name:"配置测试任务",input:"任务指令 + 被测模型 / 已有对话",output:"版本化测试任务",action:"生成任务"},
      {name:"建立评分标准",input:"任务指令 + L0 通用规则",output:"L0 + L1 评分标准",action:"建立标准"},
      {name:"测试外呼模型",input:"用户模拟器 / 已有日志 + 评分标准",output:"测试对话 + 逐项判定",action:"运行测试"},
      {name:"输出模型评测报告",input:"模型版本 + 全部判定",output:"门禁 + 履约 + P0 + 覆盖",action:"生成报告"},
      {name:"分析失败原因",input:"模型报告 + SOP / 裁判 / 数据信号",output:"模型 / SOP / 裁判 / 测试数据根因",action:"分析根因"},
      {name:"生成优化与回归计划",input:"根因 + 失败证据 + 固定版本",output:"对应优化 + 同尺回归请求",action:"生成计划"}
    ];
    const FLOW=[
      {input:["任务指令 / SOP","被测模型或已有对话"],process:["校验格式与隐私脱敏","冻结输入、版本与哈希"],output:["版本化测试任务包","统一测试批次"]},
      {input:["SOP 原文","L0 通用安全红线"],process:["拆成原子检查点","校验来源、层级与严重度"],output:["L0 通用规则","L1 业务规则","Checklist 版本"]},
      {input:["用户模拟器 / 已有日志","被测外呼模型","固定 Checklist"],process:["生成 persona 压力回应","外呼模型生成关键回复","规则 Judge 逐项评分","固化证据与报告"],output:["测试对话","逐项判定","覆盖率与未触达项"]},
      {input:["模型版本","全部逐项判定","关键失败证据"],process:["聚合通话与检查点指标","执行 P0 与履约门禁"],output:["上线结论","履约率与 P0","可下载评测报告"]},
      {input:["模型评测报告","SOP 健康度","裁判与测试数据信号"],process:["计算四类根因信号","按严重度与可信度排序"],output:["首要根因","责任人","可审计归因证据"]},
      {input:["首要根因","失败证据","固定版本指纹"],process:["生成对应优化动作","保持评分尺同尺回归"],output:["优化对象与计划","回归入口","v1 / v2 对比证据"]}
    ];
    const state={mode:"cache",modeChosen:false,forceLive:true,preset:"t02",testMode:"simulation",targetModel:"delivery-baseline-v1",backendModel:"",testCount:10,step:1,completed:new Set(),results:{},sessionId:"",running:false,flowMessage:"",flowProgress:0,server:false,backend:false,backendChecking:false,backendError:"",taskText:"",txText:"",taskName:"",txName:"",votes:1};
    const $=s=>document.querySelector(s), esc=v=>String(v==null?"":v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    const preset=()=>CACHE.presets[state.preset]||{};
    const result=n=>state.results[n];
    const empty=text=>'<div class="empty">'+esc(text)+'</div>';
    const metric=(value,label,wide=false,text=false)=>'<div class="metric '+(wide?'wide':'')+'"><b class="'+(text?'text':'')+'">'+esc(value==null?'—':value)+'</b><span>'+esc(label)+'</span></div>';
    const artifacts=items=>items?'<div class="artifact-row">'+Object.entries(items).map(([key,url])=>'<a class="artifact" href="'+esc(url)+'" target="_blank" rel="noopener">'+esc({task_package:'测试任务包',ingestion_report:'输入校验记录',normalized_transcripts:'测试对话',checklist:'完整评分标准',decision:'模型评测报告数据',attribution:'根因分析',repair_plan:'优化计划',regression_request:'同尺回归请求',revision_draft:'优化草案'}[key]||key)+'</a>').join('')+'</div>':'';
    const toast=(text,error=false)=>{const el=$("#toast");el.textContent=text;el.className="toast show"+(error?' error':'');clearTimeout(toast.timer);toast.timer=setTimeout(()=>el.className="toast",2800)};
    const wait=ms=>new Promise(resolve=>setTimeout(resolve,ms));

    function reset(){state.step=1;state.completed.clear();state.results={};state.sessionId="";state.running=false;state.flowMessage="";state.flowProgress=0;render()}
    function canOpen(index){return index<=1||state.completed.has(index-1)||state.completed.has(index)}
    function go(index){if(index<1||index>6)return;if(!canOpen(index)){toast("请先完成上一步",true);return}state.step=index;render();window.scrollTo({top:0,behavior:"smooth"})}
    function complete(index,data){state.results[index]=data;state.completed.add(index);state.flowProgress=100;render()}

    function renderSteps(){
      $("#steps").innerHTML=STEP.map((s,i)=>'<button class="step '+(i===3?'core ':'')+(state.step===i+1?'active ':'')+(state.completed.has(i+1)?'done':'')+'" data-step="'+(i+1)+'"><span class="step-index">'+String(i+1).padStart(2,'0')+'</span><span class="step-name">'+esc(s.name)+'</span></button>').join('');
      document.querySelectorAll('[data-step]').forEach(b=>b.onclick=()=>go(Number(b.dataset.step)));
    }
    function flowSpec(){
      const base=FLOW[state.step-1],data=result(state.step),spec={input:[...base.input],process:[...base.process],output:[...base.output]};
      if(!data)return spec;
      if(state.step===1)spec.output=[{label:"任务包已生成",meta:data.task_name},{label:"测试批次",meta:(data.test_count||0)+" 通"}];
      if(state.step===2)spec.output=[{label:"L0 通用规则",meta:data.l0_common_rules+" 项"},{label:"L1 业务规则",meta:data.l1_sop_rules+" 项"},{label:"Checklist",meta:data.checkpoints+" 项"}];
      if(state.step===3)spec.output=[{label:"完成测试",meta:data.total_runs+" 通"},{label:"逐项判定",meta:data.judgment_count+" 条"},{label:"检查点覆盖",meta:data.coverage_rate+"%"}];
      if(state.step===4)spec.output=[{label:"上线门禁",meta:data.gate},{label:"履约率",meta:(data.fulfillment_rate==null?"—":data.fulfillment_rate+"%")},{label:"P0 触发",meta:data.p0_triggered_calls+" 通"}];
      if(state.step===5){const labels={target_model:"外呼模型",instruction:"SOP / 指令",judge:"裁判",test_data:"测试数据",uncertain:"证据不足"};spec.output=[{label:"首要根因",meta:labels[data.primary_category]||data.primary_label},{label:"归因置信度",meta:data.primary_confidence},{label:"责任对象",meta:((data.roots||[])[0]||{}).owner||"人工复核"}]}
      if(state.step===6){const r=data.actual_regression,b=r&&r.baseline&&r.baseline.metrics,c=r&&r.candidate&&r.candidate.metrics;spec.output=r?[{label:"模型门禁",meta:b.gate+" → "+c.gate},{label:"P0 触发",meta:b.p0_triggered_runs+" → "+c.p0_triggered_runs},{label:"同尺回归",meta:"返回第 "+data.return_step+" 步"}]:[{label:"优化对象",meta:data.optimization_target},{label:"回归模型",meta:data.candidate_target_model_version||data.target_model_version},{label:"同尺回归",meta:"返回第 "+data.return_step+" 步"}]}
      return spec;
    }
    function flowNode(node,nodeState='pending'){const item=typeof node==='string'?{label:node}:node;return '<div class="flow-node '+nodeState+'"><span>'+esc(item.label)+'</span>'+(item.meta?'<small>'+esc(item.meta)+'</small>':'')+'</div>'}
    function flowColumn(type,title,nodes,status){let active=-1;if(type==='process'&&status==='running')active=Math.min(nodes.length-1,Math.floor(Math.max(0,state.flowProgress)/100*nodes.length));return '<div class="flow-column '+type+'"><div class="flow-column-label">'+esc(title)+'</div>'+nodes.map((node,index)=>{let nodeState='pending';if(status==='done'||type==='input'&&status==='running')nodeState='done';else if(type==='process'&&status==='running')nodeState=index<active?'done':index===active?'active':'pending';return flowNode(node,nodeState)}).join('')+'</div>'}
    function renderFlow(){const spec=flowSpec(),status=state.running?'running':state.completed.has(state.step)?'done':'ready',label=state.flowMessage||({running:'现场请求处理中',done:state.mode==='live'?'现场产物已生成':'已载入验证产物',ready:'等待执行'}[status]);const link=second=>'<div class="flow-link '+(second?'second':'')+'"><span class="flow-pulse"></span></div>';const map=$("#flowMap");map.className='flow-map '+status;map.innerHTML='<div class="flow-map-head"><div class="flow-map-title">动态审计信号树</div><div class="flow-state">'+esc(label)+'</div></div><div class="flow-tree">'+flowColumn('input','INPUT · 输入叶节点',spec.input,status)+link(false)+flowColumn('process','PROCESS · 处理主干',spec.process,status)+link(true)+flowColumn('output','OUTPUT · 输出分支',spec.output,status)+'</div>'}
    function setFlowMessage(message,progress){state.flowMessage=message;if(progress!=null)state.flowProgress=Math.max(0,Math.min(99,Number(progress)||0));renderFlow()}
    function renderHeader(){const meta=STEP[state.step-1];$("#stageTitle").textContent=String(state.step).padStart(2,'0')+' · '+meta.name;$("#inputType").textContent=meta.input;$("#outputType").textContent=meta.output;$("#execute").textContent=(state.mode==='cache'?'载入\n':'')+meta.action;$("#execute").style.whiteSpace='pre-line';$("#execute").disabled=state.running||!canExecute();$("#relay").classList.toggle('running',state.running);$("#prev").disabled=state.step===1||state.running;$("#next").disabled=!state.completed.has(state.step)||state.step===6||state.running;$("#runLabel").textContent=state.sessionId||result(3)?.run_id||preset().cache_run||'等待开始'}
    function canExecute(){if(state.step===1)return true;return Boolean(result(state.step-1))}
    function renderMode(){
      $("#cacheMode").classList.toggle('active',state.mode==='cache');$("#liveMode").classList.toggle('active',state.mode==='live');
      const badge=$("#truthBadge");badge.className='truth-badge'+(state.mode==='live'?' live':'');badge.textContent=state.mode==='cache'?'完整批次 · 已验证产物':!state.server?'20秒探针 · 本地服务未连接':state.backendChecking?'20秒探针 · 正在验证模型后端':state.backend?'20秒探针 · 禁止缓存':'20秒探针 · 模型后端不可用';
    }
    function renderInput(){const fn=[input1,input2,input3,input4,input5,input6][state.step-1];$("#inputBody").innerHTML=fn()}
    function renderOutput(){const data=result(state.step);if(!data){$("#outputBody").innerHTML=empty('等待“'+STEP[state.step-1].action+'”');return}const fn=[output1,output2,output3,output4,output5,output6][state.step-1];$("#outputBody").innerHTML=fn(data)}
    function render(){renderMode();renderSteps();renderHeader();renderFlow();renderInput();renderOutput();bindDynamic()}

    function input1(){
      const choices=Object.entries(CACHE.presets||{}).map(([id,item])=>'<button class="preset '+(id===state.preset?'selected':'')+'" data-preset="'+esc(id)+'"><b>'+esc(item.label)+'</b><span>'+esc(item.tag)+'</span></button>').join('');
      const modeSwitch='<div class="entry-switch '+(state.mode==='cache'?'disabled':'')+'"><button class="'+(state.testMode==='simulation'?'selected':'')+'" data-test-mode="simulation">模拟测试模式</button><button class="'+(state.testMode==='logs'?'selected':'')+'" data-test-mode="logs">已有日志质检模式</button></div>';
      const note=state.mode==='cache'?'<div class="mode-note">完整结果：读取10通正式评测产物，用于最终数字与断网备份</div>':'<div class="mode-note live">20秒现场探针：对当前输入重新编译、生成 persona 压力回应并真实调用被测模型；不复用 Checklist、对话或 judgments</div>';
      const options=kind=>Object.entries(MATERIALS).filter(([id])=>CACHE.presets&&CACHE.presets[id]).map(([id,item])=>'<option value="'+esc(id)+'" '+(id===state.preset?'selected':'')+'>'+esc(item[kind])+'</option>').join('');
      const transcript=state.testMode==='logs'?'<div class="material-row"><div class="material-icon">LOG</div><div class="material-copy"><label for="transcriptLibrary">已有对话记录 <span>已内置 · 自动匹配</span></label><select id="transcriptLibrary" class="material-select">'+options('transcripts')+'</select></div></div>':'<div class="material-row"><div class="material-icon">SIM</div><div class="material-copy"><label>测试对话 <span>现场生成</span></label><div class="material-generated">无需选择本地文件，由用户模拟器根据Persona生成</div></div></div>';
      const library='<div class="material-library"><div class="material-library-head"><b>页面内置测试素材库</b><span>随Demo部署 · 不读取现场电脑</span></div><div class="material-row"><div class="material-icon">SOP</div><div class="material-copy"><label for="taskLibrary">任务指令 / SOP <span>已内置</span></label><select id="taskLibrary" class="material-select">'+options('sop')+'</select></div></div>'+transcript+'</div>';
      const model=state.testMode==='simulation'?'<div class="inline-fields"><div><div class="field-label">'+(state.mode==='live'?'被测模型调用名（真实后端）':'被测模型版本')+'</div><input id="targetModel" class="text-input" value="'+esc(state.targetModel)+'"></div><div><div class="field-label">测试数量</div><input id="testCount" class="text-input" type="number" min="1" max="24" value="'+esc(state.testCount)+'"></div></div>':'';
      return modeSwitch+note+'<div class="preset-grid">'+choices+'</div>'+library+(state.mode==='live'?model:'');
    }
    function input2(){const p=result(1);return '<div class="metrics">'+metric(p.task_name,'任务名称',true,true)+metric(p.test_mode==='simulation'?'模拟测试':'已有日志','测试入口',false,true)+metric(p.target_model_version,'被测模型版本',true,true)+metric(p.test_count,'测试数量')+metric(p.instruction_chars,'SOP 字符')+'</div><div class="excerpt">'+esc(p.instruction_excerpt||'')+'</div>'}
    function input3(){const p=result(1),c=result(2),people=(p.personas||[]).map(x=>x.id).join('、'),liveScope=state.mode==='live'&&p.test_mode==='simulation'?'<div class="mode-note"><strong>20秒现场探针：</strong>规则 persona 生成一次压力回应，被测模型真实生成关键回复，确定性 Judge 即时评分。完整多轮模拟器与 LLM 裁判结论请切换「完整结果」。</div>':'';return '<div class="metrics">'+metric(p.target_model_version,'被测模型',true,true)+metric(p.test_count,'计划测试')+metric(p.persona_count,'Persona')+metric(c.checkpoints,'评分项')+metric('L0 '+c.l0_common_rules+' / L1 '+c.l1_sop_rules,'评分层级',true,true)+'</div><div class="excerpt">'+esc(people||'已有日志不启用 Persona')+'</div>'+liveScope+(state.mode==='live'?'<div class="mode-note live">裁判口径：现场规则轨 1 票 · 输出均附原文证据</div>':'<div class="mode-note">缓存结果沿用正式运行票数</div>')}
    function input4(){const e=result(3);return '<div class="metrics">'+metric(e.target_model_version,'模型版本',true,true)+metric(e.total_runs,state.mode==='live'?'现场探针数量':'正式测试数量')+metric(e.judgment_count,'逐项判定')+metric(e.failed_judgments,'未通过项')+metric(e.coverage_rate+'%','检查点覆盖')+metric(e.blind_spot_count,'未触达检查点')+'</div>'+judgmentList(e.sample_judgments||[],3)}
    function input5(){const d=result(4);return '<div class="gate '+(d.gate==='可上线'?'pass':'')+'"><b>'+esc(d.gate)+'</b><span>外呼模型上线门禁</span></div><div class="metrics">'+metric(d.target_model_version,'模型版本',true,true)+metric(d.fulfillment_rate==null?'—':d.fulfillment_rate+'%','履约率')+metric(d.p0_triggered_calls,'P0 触发电话')+metric(d.coverage_rate+'%','检查点覆盖')+'</div>'+problemList(d.top_problems||[],3)}
    function input6(){const a=result(5),root=(a.roots||[])[0]||{};return '<div class="root"><div class="root-head"><b>'+esc(a.primary_label||root.label)+'</b><span class="chip">'+esc(a.primary_confidence||root.confidence)+'</span></div><p>'+esc((root.evidence||[]).join('；'))+'</p></div><div class="metrics">'+metric(root.owner||'人工复核','优化负责人',true,true)+metric((root.actions||[]).length,'候选动作')+metric((a.signals||{}).needs_human_review,'待复核项')+'</div>'}

    function output1(p){const h=p.hashes||{};return '<div class="metrics">'+metric(p.task_name,'版本化测试任务',true,true)+metric(p.test_mode==='simulation'?'用户模拟器':'已有日志','测试入口',false,true)+metric(p.target_model_version,'被测模型版本',true,true)+metric(p.test_count,'测试数量')+metric(p.persona_count,'Persona')+'</div><div class="status-line"><span class="dot"></span>SOP '+esc(String(h.sop_sha256||'').slice(0,12))+' · 对话 '+esc(String(h.transcripts_sha256||'待生成').slice(0,12))+'</div>'+artifacts(p.artifacts)}
    function output2(c){return '<div class="metrics">'+metric(c.checkpoints,'评分项')+metric(c.l0_common_rules,'L0 通用安全规则')+metric(c.l1_sop_rules,'L1 业务规则')+metric(c.approved?'已审核':'待审核','使用状态',false,true)+'</div><div class="status-line"><span class="dot"></span>'+esc(c.generation_method)+' · Checklist '+esc(String(c.checklist_sha256||'').slice(0,12))+'</div>'+checkpointList(c.samples||[])+artifacts(c.artifacts)}
    function output3(e){const people=(e.personas||[]).map(x=>x.id+'×'+x.calls).join('、');return '<div class="metrics">'+metric(e.target_model_version,'被测模型版本',true,true)+metric(e.total_runs,'完成测试')+metric(e.persona_count,'Persona')+metric(e.coverage_rate+'%','检查点覆盖')+metric(e.blind_spot_count,'未触达检查点')+metric(e.evaluation_errors,'执行异常')+'</div><div class="excerpt">'+esc(people||'已有日志')+'</div>'+(e.execution_note?'<div class="status-line"><span class="dot"></span>'+esc(e.execution_note)+'</div>':'')+judgmentList(e.sample_judgments||[],5)}
    function output4(d){return '<div class="gate '+(d.gate==='可上线'?'pass':'')+'"><b>'+esc(d.gate)+'</b><span>模型 '+esc(d.target_model_version)+' · '+esc(d.total_runs)+(state.mode==='live'?' 通现场探针':' 通正式结果')+'</span></div><div class="metrics">'+metric(d.fulfillment_rate==null?'—':d.fulfillment_rate+'%','履约率')+metric(d.p0_triggered_calls,'P0 触发电话')+metric(d.key_failed_judgments,'关键失败项')+metric(d.coverage_rate+'%','检查点覆盖')+metric(d.blocked_runs,'打回电话')+metric(d.review_queue_count,'人工复核')+'</div>'+problemList(d.top_problems||[],8)+(d.report_url?'<div class="artifact-row"><a class="artifact" href="'+esc(d.report_url)+'" target="_blank" rel="noopener">下载 / 打开模型评测报告</a></div>':'')+artifacts(d.artifacts)}
    function output5(a){const labels={target_model:'外呼模型',instruction:'SOP / 任务指令',judge:'裁判',test_data:'测试数据',uncertain:'证据不足'};return (a.roots||[]).slice(0,4).map((root,i)=>'<div class="root"><div class="root-head"><b>'+(i===0?'首要根因 · ':'候选根因 · ')+esc(labels[root.category]||root.label)+'</b><span class="chip">'+esc(root.confidence)+'</span></div><p>'+esc((root.evidence||[]).join('；'))+'</p><p>负责人：'+esc(root.owner)+'</p></div>').join('')+artifacts(a.artifacts)}
    function output6(p){const same=!p.sop_changed&&!p.checklist_changed,r=p.actual_regression,b=r&&r.baseline&&r.baseline.metrics,c=r&&r.candidate&&r.candidate.metrics,report=r&&r.candidate&&r.candidate.report_url,cmp=r?'<div class="root"><div class="root-head"><b>实际同尺回归 · '+esc(r.baseline.version)+' → '+esc(r.candidate.version)+'</b><span class="chip">已执行</span></div><p>门禁：'+esc(b.gate)+' → '+esc(c.gate)+'；P0：'+esc(b.p0_triggered_runs)+' → '+esc(c.p0_triggered_runs)+'；履约率：'+esc(b.fulfillment_rate)+'% → '+esc(c.fulfillment_rate)+'%；平均分：'+esc(b.avg_score)+' → '+esc(c.avg_score)+'</p><p>用户输入 / SOP / Checklist 哈希均保持不变；正常 Judge 重评，未手改 judgments。</p>'+(report?'<div class="artifact-row"><a class="artifact" href="'+esc(report)+'" target="_blank" rel="noopener">打开 v2 回归报告</a></div>':'')+'</div>':'';return cmp+'<div class="metrics">'+metric(p.optimization_target,'优化对象',true,true)+metric(p.candidate_target_model_version||p.target_model_version,'回归模型版本',true,true)+metric(p.actions.length,'优化动作')+metric('第 '+p.return_step+' 步','回归入口',false,true)+metric(p.sop_changed?'变化':'不变','SOP',false,true)+metric(p.checklist_changed?'变化':'不变','Checklist',false,true)+'</div><div class="list">'+p.actions.map(x=>'<div class="item"><b>'+esc(x.owner)+'</b><p>'+esc(x.action)+'</p><p>验收：'+esc(x.verification)+'</p></div>').join('')+'</div>'+(same?'<div class="status-line"><span class="dot"></span>同尺回归：SOP 与 Checklist 哈希保持不变</div>':'')+'<div class="loop"><span class="loop-num">1</span><span class="loop-text">执行对应根因的优化</span><span class="loop-num">2</span><span class="loop-text">返回第 '+esc(p.return_step)+' 步</span><span class="loop-num">3</span><span class="loop-text">固定版本与评分尺完成回归</span></div>'+artifacts(p.artifacts)}
    function checkpointList(rows){return '<div class="list">'+rows.map(x=>'<div class="item"><div class="item-top"><span class="item-id">'+esc(x.layer)+' · '+esc(x.id)+'</span><span class="chip '+(x.severity==='critical'?'critical':'')+'">'+esc(x.severity)+'</span></div><b>'+esc(x.text)+'</b><p>原文：'+esc(x.source_quote)+'</p></div>').join('')+'</div>'}
    function judgmentList(rows,limit){return '<div class="list">'+rows.slice(0,limit).map(x=>'<div class="item"><div class="item-top"><span class="item-id">'+esc(x.run_id)+' · '+esc(x.checkpoint_id)+'</span><span class="chip '+esc(x.verdict)+'">'+esc({fail:'未通过',pass:'通过',na:'不适用'}[x.verdict]||x.verdict)+'</span></div><b>'+esc(x.checkpoint_text||x.checkpoint_id)+'</b><p>证据：'+esc(x.evidence||'无可展示证据')+'</p></div>').join('')+'</div>'}
    function problemList(rows,limit){return rows.slice(0,limit).map(x=>{const rate=x.failure_rate==null?0:x.failure_rate;return '<div class="problem"><div class="problem-head"><span class="problem-name">'+esc(x.text)+'</span><span class="problem-rate">'+(x.failure_rate==null?'未触达':rate+'%')+'</span></div><div class="bar"><i style="width:'+rate+'%"></i></div></div>'}).join('')}

    function bindDynamic(){
      document.querySelectorAll('[data-preset]').forEach(b=>b.onclick=()=>{state.preset=b.dataset.preset;const item=preset(),p=item.steps&&item.steps['1']||{};state.testMode=item.test_mode||p.test_mode||'simulation';state.targetModel=state.mode==='live'?(state.backendModel||state.targetModel):(p.target_model_version||state.targetModel);state.testCount=state.mode==='live'?Math.min(state.testCount,1):(p.test_count||p.conversations||state.testCount);state.taskText='';state.txText='';state.taskName='';state.txName='';reset();toast(preset().label+' 已选择')});
      document.querySelectorAll('[data-test-mode]').forEach(b=>b.onclick=()=>{if(state.mode==='cache')return;state.testMode=b.dataset.testMode;state.txText='';state.txName='';reset()});
      document.querySelectorAll('[data-vote]').forEach(b=>b.onclick=()=>{state.votes=Number(b.dataset.vote);render()});
      const chooseMaterial=id=>{if(!MATERIALS[id]||!CACHE.presets[id])return;state.preset=id;const item=preset(),p=item.steps&&item.steps['1']||{};state.targetModel=state.mode==='live'?(state.backendModel||state.targetModel):(p.target_model_version||state.targetModel);state.testCount=state.mode==='live'?Math.min(state.testCount,1):(p.test_count||p.conversations||MATERIALS[id].count);state.taskText='';state.txText='';state.taskName=MATERIALS[id].sop;state.txName=MATERIALS[id].transcripts;reset();toast(preset().label+' 素材包已载入，SOP与对话自动匹配')};
      const taskLibrary=$("#taskLibrary"),transcriptLibrary=$("#transcriptLibrary");
      if(taskLibrary)taskLibrary.onchange=e=>chooseMaterial(e.target.value);
      if(transcriptLibrary)transcriptLibrary.onchange=e=>chooseMaterial(e.target.value);
      const tm=$("#targetModel"),tc=$("#testCount");
      if(tm)tm.onchange=e=>{state.targetModel=e.target.value.trim()||state.targetModel};
      if(tc)tc.onchange=e=>{state.testCount=Math.max(1,Math.min(24,Number(e.target.value)||6))};
    }
    async function post(path,body){const response=await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const data=await response.json().catch(()=>({ok:false,error:'服务返回无法解析'}));if(!response.ok||!data.ok)throw new Error(data.error||'执行失败');return data.result||data}
    async function livePost(path,body,message,minDuration=5200){setFlowMessage(message,18);const started=Date.now(),data=await post(path,body);const reveal=[{p:45,t:'现场计算完成，正在核对中间产物'},{p:72,t:'版本与哈希已固化，正在展开证据'},{p:92,t:'证据已就绪，正在生成输出分支'}];for(let i=0;i<reveal.length;i+=1){const remaining=minDuration-(Date.now()-started),slots=reveal.length-i;if(remaining>0)await wait(Math.min(1800,remaining/slots));setFlowMessage(reveal[i].t,reveal[i].p)}return data}
    async function runLiveStep(){
      if(!state.server)throw new Error('本地实时服务未连接，请先运行 python3 -m evalcall demo');
      if(state.step===1){const body={preset:state.preset,test_mode:state.testMode,target_model:state.targetModel,test_count:state.testCount,force_live:true};if(state.testMode==='simulation'&&state.taskText)Object.assign(body,{task_text:state.taskText,task_name:state.taskName});if(state.testMode==='logs'&&(state.taskText||state.txText)){if(!state.taskText||!state.txText)throw new Error('已有日志模式必须同时选择 SOP 和对话记录');Object.assign(body,{task_text:state.taskText,transcripts_text:state.txText,task_name:state.taskName,transcripts_name:state.txName})}const data=await livePost('/api/intake',body,'现场校验材料、脱敏并计算哈希');state.sessionId=data.session_id;return data}
      if(state.step===2)return livePost('/api/compile',{session_id:state.sessionId},'正在现场拆解 SOP，并逐条校验原文来源');
      if(state.step===3){setFlowMessage('正在创建20秒现场探针',5);const probeStarted=Date.now(),deadline=probeStarted+19500,started=await post('/api/evaluate',{session_id:state.sessionId,votes:1});for(;;){if(Date.now()>deadline)throw new Error('现场探针超过20秒，请检查模型后端延迟');await wait(500);const payload=await fetch('/api/jobs/'+started.job_id,{cache:'no-store'}).then(r=>r.json());const job=payload.job||{};setFlowMessage((job.stage||'模型正在生成并评测对话')+' · '+esc(job.progress||0)+'%',job.progress||0);$("#outputBody").innerHTML='<div class="progress"><div class="progress-top"><span>'+esc(job.stage||'正在检查')+'</span><span>'+esc(job.progress||0)+'%</span></div><div class="bar"><i style="width:'+esc(job.progress||0)+'%"></i></div></div>';if(job.status==='failed')throw new Error(job.error||'评测失败');if(job.status==='completed'){const remaining=5200-(Date.now()-probeStarted);if(remaining>0){setFlowMessage('真实判定已完成，正在展开证据',92);await wait(remaining)}return job.result}}}
      if(state.step===4)return livePost('/api/decision',{session_id:state.sessionId},'正在聚合本次 judgments 并执行上线门禁');
      if(state.step===5)return livePost('/api/attribution',{session_id:state.sessionId},'正在计算模型、SOP、裁判与测试数据信号');
      return livePost('/api/plan',{session_id:state.sessionId},'正在按本次根因生成优化与同尺回归计划');
    }
    async function execute(){if(state.running||!canExecute())return;state.running=true;state.flowProgress=1;state.flowMessage=state.mode==='cache'?'正在读取已验证产物':'请求已发往本地服务';render();try{let data;if(state.mode==='cache'){await wait(520);data=preset().steps[String(state.step)];if(!data)throw new Error('该步骤没有可用的已验证结果')}else data=await runLiveStep();state.flowMessage='';complete(state.step,data);toast(state.mode==='cache'?'已载入完整验证产物':'第 '+state.step+' 步现场执行完成')}catch(error){state.flowMessage='执行失败';state.flowProgress=0;toast(error.message||String(error),true)}finally{state.running=false;render()}}
    async function refreshHealth(){
      try{const health=await fetch('/api/health',{cache:'no-store'}).then(r=>r.json());state.server=Boolean(health.ok);state.backend=Boolean(health.backend_available);state.backendChecking=Boolean(health.backend_checking);state.backendError=health.backend_error||'';state.backendModel=health.model||state.backendModel}catch(error){state.server=false;state.backend=false;state.backendChecking=false;state.backendError=String(error)}
      render();
      return state.server&&!state.backendChecking;
    }
    async function boot(){
      await refreshHealth();
      for(let i=0;i<45&&state.server&&state.backendChecking;i+=1){await wait(2000);await refreshHealth()}
      if(state.server&&state.backend&&!state.modeChosen){state.mode='live';state.targetModel=state.backendModel||state.targetModel;state.testCount=1;reset()}
      if(!Object.keys(CACHE.presets||{}).length)toast('演示数据未生成，请运行 scripts/build_demo_cache.py',true);
      render();
    }
    $("#cacheMode").onclick=()=>{state.modeChosen=true;state.mode='cache';const p=preset().steps&&preset().steps['1']||{};state.targetModel=p.target_model_version||state.targetModel;state.testCount=p.test_count||p.conversations||10;reset()};
    $("#liveMode").onclick=()=>{state.modeChosen=true;state.mode='live';state.targetModel=state.backendModel||state.targetModel;state.testCount=1;reset();if(!state.server)toast('本地服务未连接；请先运行 python3 -m evalcall demo',true);else if(!state.backend)toast('服务已连接，但模型后端不可用：'+state.backendError,true)};
    $("#execute").onclick=execute;$("#prev").onclick=()=>go(state.step-1);$("#next").onclick=()=>go(state.step+1);
    boot();
  })();
  </script>
</body>
</html>
