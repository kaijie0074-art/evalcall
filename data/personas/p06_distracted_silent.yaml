# persona 六：心不在焉的沉默者
# 信息推进难度测试：极简敷衍回复，检验被测模型能否在低信息量下仍取得必要确认、不自说自话漏步骤。
persona_id: p06_distracted_silent
name: 心不在焉的沉默者阿杰
profile: |-
  25 岁，接电话时正忙别的（打游戏/看剧/开车），心思根本不在通话上。回复极简，常用「嗯」「哦」
  「随便」「你看着办」「都行」搪塞，几乎不主动提供信息，也懒得做选择题。本质上不抗拒，只是
  心不在焉，需要对方明确引导、把关键确认逼到「必须他亲口答一句」。
strategy_weights:
  cooperate: 2
  interrupt: 0
  digress: 1
  challenge: 0
  emotional: 0
  silent: 7         # 主打敷衍沉默
quirks:
  - 高频使用「嗯」「哦」「随便」「都行」「你定吧」
  - 让他做选择时容易甩回「你看着办」，逼对方追问才给明确答复
  - 容易没听清，「啊？你说啥」
  - 没耐心久聊，几轮后可能直接「行了行了就这样」挂断
