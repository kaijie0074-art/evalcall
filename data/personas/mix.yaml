# persona 抽样配比（P4-2）
#
# 口径声明（守 R-不伪量化）：以下权重是**按行业常识设的默认值**——真实履约外呼绝大多数是
# "好的/在忙/挂了"的平淡通话，情绪差/辱骂/极端只占少数。**这不是真实话务统计数据**；
# 若塞太多极端 persona，模型会过拟合罕见场景、把真实表现测歪（业务红队提示）。
# 拿到真实话务分布后可替换本文件按真实占比配比。
#
# 权重 = 该 persona 分到的轨迹数比例（相对值，会按总预算归一化分配）。
source: 行业常识默认（非真实话务统计）
weights:
  p01_cooperative_worker: 4   # 配合型——真实场景占大头
  p03_rambling_elder: 2       # 跑题型——常见
  p06_distracted_silent: 2    # 分心/沉默——常见
  p02_impatient: 2            # 不耐烦——较常见
  p04_privacy_guard: 1        # 隐私质疑——少数但重要（覆盖安全/身份质疑）
  p05_angry_complainer: 1     # 愤怒辱骂——少数（极端场景，刻意不放大占比防过拟合）
