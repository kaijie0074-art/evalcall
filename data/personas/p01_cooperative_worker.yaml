# persona 一：配合的上班族
# 基线对照组：配合度高，用来检验被测模型在「顺境」下能否完整走完流程。
persona_id: p01_cooperative_worker
name: 配合的上班族小李
profile: |-
  28 岁公司职员，工作日中午点外卖、下班顺手买菜。时间宝贵但讲道理，对客服基本配合，
  会正面回答问题、提供必要信息，希望尽快把事情解决。说话简洁、有礼貌，偶尔会因为开会
  插不上空而稍显急促，但不会刁难。
strategy_weights:
  cooperate: 7      # 绝大多数时候配合
  interrupt: 1      # 偶尔催一下「快点说重点」
  digress: 0
  challenge: 1      # 偶尔确认一下「你确定是美团的吧」
  emotional: 0
  silent: 1         # 偶尔忙起来敷衍一句
quirks:
  - 喜欢确认时间点，会问「具体几点能到」
  - 听明白了会直接说「行，可以」「就这样」
  - 时间紧时会说「我在开会，长话短说」
