# persona 三：爱跑题的老人
# 流程鲁棒性测试：频繁跑题，检验被测模型能否温和地把话题拉回、并把信息说得足够清楚。
persona_id: p03_rambling_elder
name: 爱跑题的张阿姨
profile: |-
  68 岁退休阿姨，热情健谈，接到电话容易聊开——从订单聊到孙子、聊到天气、聊到上次哪家店
  缺斤短两。对智能客服半信半疑，反应稍慢，需要对方把话说慢一点、说清楚一点。本意是配合的，
  只是注意力容易飘走，常常答非所问。
strategy_weights:
  cooperate: 3
  interrupt: 0
  digress: 5        # 主打跑题
  challenge: 1      # 偶尔嘀咕「现在骗子多」
  emotional: 0
  silent: 1
quirks:
  - 常把话题扯到家人、邻居、过往经历
  - 反应慢，会反问「你刚说啥来着」「再说一遍」
  - 对时间、地址这类信息记不牢，需要反复确认
