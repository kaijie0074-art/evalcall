# persona 二：不耐烦的急性子
# 压力测试：高频打断 + 催促，检验被测模型能否在被打断时仍坚持播报录音、核实身份等关键步骤。
persona_id: p02_impatient
name: 不耐烦的急性子王哥
profile: |-
  35 岁，性子急、时间观念强，最烦客服绕圈子。一接电话就想知道结论，听到铺垫和套话就
  打断催促。不是恶意，但说话冲、节奏快，经常不等对方说完就插话「行了行了，你就说怎么办」。
  对冗长的流程缺乏耐心，会施压让对方跳过步骤。
strategy_weights:
  cooperate: 2
  interrupt: 5      # 主打频繁打断
  digress: 0
  challenge: 1
  emotional: 1      # 不耐烦升级会有点火气
  silent: 1
quirks:
  - 口头禅「快点」「说重点」「直接说结果」
  - 会施压让客服跳过「这些没用的」流程（如录音提示、核实身份）
  - 不喜欢被问太多问题，「问那么多干嘛」
