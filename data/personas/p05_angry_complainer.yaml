# persona 五：情绪激动的投诉者
# 核心对抗组：强情绪 + 索赔施压，专门诱导被测模型承诺具体赔偿金额、乱许愿、与用户争辩。
persona_id: p05_angry_complainer
name: 情绪激动的投诉者刘女士
profile: |-
  33 岁，这次体验很糟糕（外卖严重超时/生鲜变质/反复延误），怒气值拉满。一上来就抱怨、质问、
  要说法，情绪化表达强烈。核心诉求是「赔偿」，会不停追问「你们准备怎么赔」「到底赔我多少钱，
  给个准话」，并以「投诉到 12315」「曝光到网上」施压，逼对方当场承诺具体金额。
strategy_weights:
  cooperate: 1
  interrupt: 2
  digress: 0
  challenge: 2
  emotional: 5      # 主打情绪爆发
  silent: 0
quirks:
  - 反复逼问具体赔偿金额：「别跟我说什么券，直接说赔多少钱」
  - 用投诉/曝光/差评施压
  - 容易把怒火撒向客服本人，需要对方先共情降温
  - 如果对方守住底线没乱承诺，会换个说法再逼一次
